      <main class="list-column" id="list-column">

        <div id="list"><!--SSR_START--><div class="grave-grid"><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">GuaGuaLong</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ByteDance's cartoon-dragon tutoring app for kids 2-8. China's 2021 &quot;double reduction&quot; crackdown gutted it; ByteDance later shut it for good.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Fanqie Music (Tomato Music)</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Rebranded</span></span></span><span class="gc-desc">ByteDance's free, ad- and coin-supported music streaming app. It launched in November 2022 as 番茄畅听音乐版 (a music module within the Fanqie audio platform) and was upgraded into a standalone app named 番茄音乐 in November 2025.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Fanqie Changting Music Edition / Tomato Audiobook Music Edition</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Rebranded</span></span></span><span class="gc-desc">ByteDance's free, ad/coin-supported music streaming app, launched mid-November 2022 as a music-focused spin-off of the 番茄畅听 (Tomato Audiobook) platform.</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">Douyin Supermarket</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">抖音超市 (Douyin Supermarket) was ByteDance's self-operated online grocery/FMCG channel inside Douyin E-commerce, modeled on JD Supermarket and Tmall Supermarket, using ByteDance-built warehouses and a mixed self-operated/consignment fulfillment model with same-day delivery.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">8th Note Press</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ByteDance's US book imprint, built to sell #BookTok romance and YA. After ~2 years and 30-odd titles it barely used its TikTok reach and closed in 2025.</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">Doubao-PixelDance</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">ByteDance's AI video model, from its Make Pixels Dance paper, launched under the Doubao brand for multi-shot clips. Folded into the Seedance model line in 2025.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">TikTok Notes</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">TikTok's photo-and-text app, a grid-feed Instagram rival. Tested only in Canada, Australia and Vietnam, it closed in 2025; ByteDance pushed users to Lemon8.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Melolo (Melolo - Short Dramas &amp; Reels)</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Banned</span></span></span><span class="gc-desc">Melolo is ByteDance's first overseas free short-drama (micro-drama) streaming app, launched mid-November 2024 in SE Asia (Indonesia, Philippines) and modeled on its China-domestic app Hongguo Short Drama.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Naruto: Peak Showdown</span><span class="gc-meta"><span class="type-tag">GAME</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">An officially Naruto IP-licensed 3D open-world action RPG mobile game for which ByteDance's gaming subsidiary Chaoxi Lightyear (Nuverse) held exclusive China distribution/publishing rights.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Mytopia (MyTopia - My Utopia of Novels / MyTopia Books)</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Rebranded</span></span></span><span class="gc-desc">Mytopia was ByteDance's overseas English-language web-novel reading app, launched Nov 11, 2021 (US/UK) under its Singapore subsidiary Poligon Pte. Ltd.</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">Writingo (Volcano Writing)</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">火山写作 (Writingo) was ByteDance's free AI writing assistant for Chinese and English text, built on ByteDance's self-developed Yunque (云雀) large language model.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">TikTok Music</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ByteDance's paid music service and Resso's successor, tied to TikTok. ByteDance closed it after 16 months to steer listeners to Spotify and Apple Music.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Dragonheir: Silent Gods</span><span class="gc-meta"><span class="type-tag">GAME</span><span class="status-chip"><span class="mark"></span>Shut down</span></span></span><span class="gc-desc">Dice-driven open-world RPG with a Dungeons &amp; Dragons crossover, from ByteDance's Nuverse. US servers closed in 2024 as ByteDance quit gaming; Tencent took the IP.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Hippo Aixue (renamed Doubao Aixue)</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Rebranded</span></span></span><span class="gc-desc">河马爱学 (Hippo Aixue) was an AI-powered homework-help / study app launched by ByteDance's Dali Education (大力教育) ZERO team in January 2024, targeting K-12 students with photo-based question answering, homework/mental-math/essay grading and Q&amp;A.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">TikTok Lite Rewards</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">A watch-to-earn feature in TikTok Lite paying users points to watch and invite friends. EU regulators flagged addiction risks; ByteDance pulled it in 2024.</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">Xuelang</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">ByteDance's online-learning app, launched in 2020 and later rebuilt as a Douyin creator-course tool. The standalone app closed in 2024, absorbed into Douyin Classroom.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Sponge Music (formerly Sponge Band)</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Rebranded</span></span></span><span class="gc-desc">A ByteDance mobile music-creation app first launched on 16 May 2022 as 海绵乐队 (Sponge Band), a recording-studio / vocal-optimization / one-click-Remix / auto-Mashup editing tool serving Soda Music and Douyin users.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Paopao Xinxuan / Zhuazhua Xinxuan / Guodong Xinxuan (Bubble / Paw Paw / Jelly Heart Select)</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">A trio of in-app-purchase (IAP) interactive-drama mini-programs embedded inside the Douyin app, developed by ByteDance's commercialization unit Ocean Engine (巨量引擎) and launched in early 2024 to test paid interactive/branching short-drama content monetized via in-app &quot;看点&quot; credits and memberships.</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">Zhu Xiaobang</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">住小帮 (Zhu Xiaobang) was ByteDance's one-stop home-decoration and interior-furnishing content-and-services platform, launched September 2018 (originally named 生活始末).</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Momoyu</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">摸摸鱼 (Momoyu) was ByteDance's casual / instant-play mini-game platform (&quot;game box&quot;) launched in April 2021. Users played lightweight casual games and earned a virtual reward token called 小鱼币 (Xiaoyu coins / &quot;little fish coins&quot;) by completing tasks (browsing/launching/rating games, joining player…</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">LetsChat</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ByteDance's light WhatsApp rival for young Africans. After three years and ~7M downloads it never escaped WhatsApp; ByteDance closed it in 2024.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Warhammer 40,000: Lost Crusade</span><span class="gc-meta"><span class="type-tag">GAME</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">Warhammer 40,000 strategy mobile game from ByteDance's Nuverse. Its global servers closed in February 2024 when ByteDance wound down Nuverse.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Zhuhaojia</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">住好家 (Zhuhaojia) was ByteDance/Douyin's self-operated (自营) one-stop home-renovation service, offering whole-house design, standardized construction, and after-sales guarantees both online (within the 住小帮 app) and via an offline store in Beijing's Chaoyang district.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Resso</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ByteDance's social music app for emerging markets, built around scrolling lyrics. Folded into TikTok Music abroad; India pulled it in 2024 after a data probe.</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">Baike Mingyi (Baike Famous Doctors)</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">An authoritative online medical encyclopedia / health-science content platform, founded May 2010, that held China's largest independent-copyright medical knowledge graph and was the sole designated website for the National Health Commission's authoritative medical popularization project.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">ChitChop</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ChitChop: ByteDance's overseas AI-assistant app, twin of China's Little Wukong, with 200-plus bots for work, study and creation. Quietly shut down in 2024.</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">Xingfuli (Happy Home)</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">幸福里 (Xingfuli) was ByteDance's real estate listings and transaction platform. It originated from Toutiao's property channel, launched in 2018 as 好房多 (Haoduofang), and was renamed 幸福里 in 2019.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Legend of the Spirit Cat</span><span class="gc-meta"><span class="type-tag">GAME</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">Chinese-style otome game from ByteDance's Nuverse, mixing cat-raising with five suitors. After losses Nuverse passed it to the developer; it closed on 2023-12-31.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Pico 5</span><span class="gc-meta"><span class="type-tag">HW</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ByteDance's planned next VR headset, to follow the Pico 4. After weak Pico 4 sales it quit the Meta Quest fight and scrapped the Pico 5 in 2023; it never shipped.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Shandian Search</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">A short-lived ByteDance search app built on Toutiao's content. It lasted barely three months before stalling at its 2023 update and vanishing from China's app stores.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Everphoto</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">Everphoto (时光相册) was a Chinese intelligent cloud photo-album app offering AI face-recognition auto-categorization, encrypted cloud backup, and shared albums, and went viral with a Makoto Shinkai-style &quot;Your Name&quot; photo filter.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Wulin Xianxia (overseas: Fangsi Wulin)</span><span class="gc-meta"><span class="type-tag">GAME</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">武林闲侠 was a guofeng wuxia-themed idle/placement card RPG developed by Kingsoft's Seasun studio (西山居世游/金山世游) and published by ByteDance's game arm Nuverse (朝夕光年).</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Wukong Search</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Rebranded</span></span></span><span class="gc-desc">ByteDance's ad-free search app, a Baidu challenger. It never dented Baidu and, in the post-ChatGPT rush, was renamed Xiao Wukong in 2023 and made an AI assistant.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Banciyuan</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">A Chinese fan community for cosplayers, illustrators and fan-fiction writers, launched in 2014. ByteDance bought it in 2018 and shut it in 2023.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">TikTok Now</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">TikTok Now was TikTok's BeReal clone: at a random time each day it prompted users to capture a simultaneous front-and-back-camera photo or 10-second video of an &quot;authentic&quot; moment.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Fanno</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ByteDance's shopping app selling cheap factory-direct goods to Europe. Closed in 2023 over weak repeat sales, poor quality and slow shipping.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Toutiao Search</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Rebranded</span></span></span><span class="gc-desc">ByteDance's web search app, built to challenge Baidu. It never displaced the leader and in 2023 became Youshi, a lifestyle community; web search lives on in Toutiao.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Qimiao Camera</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">A ByteDance-owned camera/photo app (Android package com.ss.android.camera). Chinese tech/financial outlets 36Kr and Cailianshe both list it among ByteDance's discarded photo-related apps (alongside uoka有咔, 狸猫相机, Helo), while 轻颜相机 and Faceu激萌 remained operating.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Kuaipai</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">快拍 (Kuaipai) was a photo/camera app launched by the team behind ByteDance's cloud photo-album product 时光相册 (Shiguang Album). It was one of several side products (alongside the photo-editor Luna and 时光相册极速版) that the team spun off; it performed poorly and was eventually delisted.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Luna</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">Luna was a photo-editing (P图) app launched by the 时光相册 (Shiguang Album / Time Album) team, which became a wholly-owned ByteDance subsidiary after ByteDance acquired 时光相册 (developed by 上海时光无限科技有限公司) in 2017.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Douyin Xiaowo (Douyin Little Nest)</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">A virtual social space launched inside the Douyin app in October 2022, built for the 抖音仔仔 (Douyin Zizai) 3D avatar system.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">OpenLanguage</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">OpenLanguage (开言英语) is an adult English-learning app built around scenario-based audio dialogues hosted by North American native speakers, originating from founder Jenny's long-running podcast 《潘吉Jenny告诉你》 (started 2012).</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">Xiaohe Yidian (Xiaohe Medical Encyclopedia)</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">小荷医典 (Xiaohe Yidian) was ByteDance's medical-knowledge / health science-popularization content platform, launched January 30, 2021 by upgrading and rebranding the 百科名医网 (Baike Mingyi) encyclopedia that ByteDance had acquired for ~500M yuan in May 2020.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Mawf</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">Mawf was a free machine-learning desktop audio plugin (VST3/AU, macOS-first with Windows promised) from ByteDance that used DDSP-style ML timbre transfer to morph any audio signal or MIDI input into realistic instrument sounds — e.g.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Lingxuan</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">灵选 (Lingxuan) was a ByteDance TapTap/WeGame-style mobile game community and distribution app, launched in a closed test on Douyin in late January 2022 with the slogan &quot;灵机一动，选到好游戏.&quot; It combined game discovery, reservations, downloads, rankings and user reviews, aiming to become a distribution…</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">BuzzVideo</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ByteDance's video app, launched in Japan in 2016 and renamed from TopBuzz Video in 2018. TikTok buried it; ByteDance closed it in 2022.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Shiqu</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">A ByteDance reading app that dropped its algorithm for human-curated interest circles. Invite-only and slow to grow, it closed eight months after launch.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Pico Worlds</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">轻世界 (Pico Worlds) was a self-developed VR social UGC &quot;metaverse&quot; app announced by ByteDance's Pico at the Pico 4 launch event in September 2022, positioned as China's answer to Meta's Horizon Worlds — users hand-modeled their own 3D worlds, customized avatars across ~26 dimensions, and socialized…</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">BaBe</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">Indonesia's top news app, pulling stories from hundreds of outlets. ByteDance, its owner from 2018, closed it in 2022 and moved users to Helo.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Party Island</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ByteDance's first metaverse-style app, a 3D world where avatars hung out and joined virtual concerts. ByteDance pulled it in 2022 and shut it after cutting the team.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">DC Worlds Collide</span><span class="gc-meta"><span class="type-tag">GAME</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">DC superhero mobile RPG from ByteDance's Nuverse. Soft-launched only in Southeast Asia, it closed about five months later and never went global.</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">Douyin Box</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">A fashion shopping app from Douyin's e-commerce arm, a Dewu/Xiaohongshu rival. ByteDance wound it down after ~9 months once Douyin's own shopping made it redundant.</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">Dali Smart Learning Lamp</span><span class="gc-meta"><span class="type-tag">HW</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">ByteDance's first hardware: a kids' smart desk lamp with a touchscreen and cameras for AI homework help. China's 2021 &quot;double reduction&quot; crackdown sank the line by 2022.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Qingbei Online School</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ByteDance's K-12 live-tutoring app, built from its 2019 buy of Hua Luogeng Online School. China's 2021 &quot;double reduction&quot; ban gutted Dali Education and closed it.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Art of War: Red Tides</span><span class="gc-meta"><span class="type-tag">GAME</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">Multiplayer strategy game from Game Science, later of Black Myth: Wukong, published in China by ByteDance's Nuverse. Its mainland servers closed on 2022-05-31.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Heipayun (HAP)</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Shut down</span></span></span><span class="gc-desc">Heipayun (黑帕云, brand HAP) was a Chinese no-code/low-code platform founded in 2019 by serial entrepreneur Chen Jinzhou (陈金洲, who earlier founded Jinshuju/金数据) for building enterprise applications without coding.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Sonic at the Olympic Games – Tokyo 2020 (China server)</span><span class="gc-meta"><span class="type-tag">GAME</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">A SEGA-developed mobile game tied to the Tokyo 2020 Olympics, the only officially licensed Olympic mobile game, published exclusively in mainland China by ByteDance's game brand Nuverse (朝夕光年).</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Biao Ren</span><span class="gc-meta"><span class="type-tag">GAME</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">Wuxia mobile RPG from ByteDance's Nuverse, from the comic Blades of the Guardians. It topped China's iOS free chart on launch in 2021, then closed a year later.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Qingbei Xiaoban</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">清北小班 (Qingbei Xiaoban) was a ByteDance/Dali Education K-12 online tutoring app launched in August 2020 that used a small-class (≤25 students) live, interactive teaching model to bring premium Beijing teaching resources to primary and middle school students (Chinese, math, English) in lower-tier…</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Dmonstudio</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">Global women's fast-fashion site, widely tied to ByteDance and built to fight SHEIN. It closed abruptly about three months after launch, having won few users.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Pixsoul</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ByteDance's camera app turning selfies into 3D avatars. Launched in Southeast Asia in 2021, it drew little interest; ByteDance dropped it by early 2022.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Xiaoquxing</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">小趣星 (Xiaoquxing) was a children's interest/educational short-video app launched by ByteDance's Dali Education unit on ~September 20, 2021, billed as ByteDance's third short-video app after Douyin and Douyin Volcano version.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Dali Smart Eye</span><span class="gc-meta"><span class="type-tag">HW</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">A low-cost (~RMB99) tablet accessory consisting of a support stand plus a reflective mirror that redirects a tablet's front camera to read materials on the desk.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">If Yooou</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">If Yooou was ByteDance's third cross-border fast-fashion attempt: a women's apparel DTC &quot;independent site&quot; (独立站) targeting Europe (UK, France, Germany, Italy, Spain, plus Belgium, Ireland, Sweden, Finland), positioned as a low-price/high-service Shein and Temu rival with most items priced roughly…</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Songguo Clinic (Pinecone Clinic) / Xiaohe Clinic</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Rebranded</span></span></span><span class="gc-desc">松果门诊 (Songguo / &quot;Pinecone&quot; Clinic) was ByteDance's first brick-and-mortar comprehensive outpatient clinic, opened in Beijing's Zhongguancun in late 2020 under its 极光 (Aurora) health unit.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">BeatDynamic</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"> pan class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">TikTok Top Moments was TikTok's first-ever (and only) NFT collection, announced Sep 30, 2021, with the first auction Oct 6, 2021.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Xindong Waimai (Heartbeat Takeout)</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">心动外卖 (Heartbeat Takeout) was ByteDance/Douyin's standalone food-delivery beta, launched as an internal test inside the Douyin app in July 2021 under the slogan &quot;心动外卖，吃你所爱&quot; (Heartbeat Takeout, eat what you love). The mini-program software was copyright-registered (reg. no.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Snapsolve</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ByteDance's photo-homework app for Indian students in grades 6-12. ByteDance closed it in 2021 when it quit India's edtech market.</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">Duoshan</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">ByteDance's Snapchat-style messenger, one of three 2019 apps meant to topple WeChat. Tencent blocked it on day one; ByteDance folded it into Douyin in 2021.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">GoGoKid</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ByteDance's app pairing Chinese children with live North American English teachers, a VIPKid rival. China's 2021 &quot;double reduction&quot; crackdown killed it.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">NPY</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Shut down</span></span></span><span class="gc-desc">An animated math app teaching logic to kids 3-12 in small live classes. ByteDance bought it in 2020 and shut it in 2021 when &quot;double reduction&quot; outlawed it.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">News Republic</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Shut down</span></span></span><span class="gc-desc">A French-built global news app drawing on thousands of publishers. Cheetah Mobile then ByteDance owned it; ByteDance quietly closed it in 2021.</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">Wukong Q&amp;A</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">ByteDance's Quora/Zhihu-style Q&amp;A app under Toutiao. Despite ~RMB 1bn in subsidies it never dented Zhihu; ByteDance closed it in 2021 and folded it into Toutiao.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Helo</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Banned</span></span></span><span class="gc-desc">ByteDance's social app for India, sharing memes and Bollywood clips in 14-plus languages. India banned it in 2020; ByteDance killed it in 2021 when it quit India.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Haohao Xuexi</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ByteDance's paid-knowledge app for adult self-improvement, a Dedao rival. ByteDance closed it in 2021 after weak sales and no breakout courses.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Smartisan / Nut Phone</span><span class="gc-meta"><span class="type-tag">HW</span><span class="status-chip"><span class="mark"></span>Shut down</span></span></span><span class="gc-desc">Chinese smartphone line, born as Luo Yonghao's Smartisan. ByteDance hired the team in 2019 and shipped Douyin phones, then killed it in January 2021 after weak sales.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Smartisan TNT Go</span><span class="gc-meta"><span class="type-tag">HW</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">Smartisan TNT go was a 12-inch 2K (2160x1440, 3:2) ten-point touch portable monitor/&quot;extension notebook&quot; released on Oct 20, 2020 alongside the Jinguo R2 phone, designed to pair with a TNT-OS phone to deliver a large-screen desktop computing experience.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Tangyuan English</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ByteDance's English app pairing a Douyin-style video feed with AI pronunciation scoring. Launched in 2019; China's 2021 &quot;double reduction&quot; crackdown closed it.</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">Toutiao Insurance</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">ByteDance's online insurance marketplace in Douyin and Toutiao. The 头号保 brand faded around 2021; ByteDance kept the broker license.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Fuxiang Haigou</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">福巷海购 (Fuxiang Haigou) was ByteDance's early cross-border IMPORT e-commerce experiment for Chinese consumers — a &quot;cross-border boutique discount mall&quot; mini-program carrying foreign brands from a dozen-plus countries, embedded inside the Douyin and Toutiao apps.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Jike Big Data</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">极课大数据 was a K-12 in-school big-data precision-teaching platform (its &quot;EI&quot; intelligent education system used image recognition and analytics to manage homework, exams and teaching data across 3,500+ schools reaching 5.7M+ teachers/students/parents).</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">AI Xue (Ai Study)</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">Ai学 (AI学) is a B-end, in-school AI learning-analytics and adaptive-learning platform — using big data, AI problem-solving and OCR handwriting recognition to provide personalized teaching/learning solutions for education regulators, schools, teachers, students and parents.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Strike Royale</span><span class="gc-meta"><span class="type-tag">GAME</span><span class="status-chip"><span class="mark"></span>Cancelled</span></span></span><span class="gc-desc">Strike Royale (火力对决) was a cartoon-style 3v3 MOBA + third-person-shooter hybrid mobile game. It began as 超凡火力 (&quot;Super Fire Force&quot;) at studio Shanghe Network (上禾网络); after ByteDance acquired the studio it became a Studio 101 / Nuverse project, was internally renamed 冲击同盟, and ran an overseas…</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">UOKA - Textured Life Camera</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">UOKA (有咔) was a ByteDance AI-filter camera app offering &quot;textured life&quot; filters for food, landscape, portrait and lifestyle scenes, using AI scene-recognition to identify 20+ shooting scenarios and auto-match curated photographer-designed filters.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Manfen</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">满分 (Manfen) was a standalone Android consumer-finance app quietly launched by ByteDance on 10 October 2019, offering cash installment loans (up to ~200,000 yuan), consumer credit/installments, and bank co-branded credit cards.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Vigo Video</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ByteDance's overseas app for 15-second clips, built from its Hypstar and Flipagram buys. ByteDance closed it in 2020 and moved users to TikTok.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">TopBuzz</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ByteDance's overseas news and video app, the English-language Toutiao. An early pre-TikTok bet, it shut in 2020 as users drained away.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Hudong Baike</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Rebranded</span></span></span><span class="gc-desc">Chinese user-editable encyclopedia, founded 2005 as a Baidu Baike rival. ByteDance bought it in 2019 and rebranded it Douyin Baike.</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">Huoshan / Douyin Huoshan</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">ByteDance's first short-video app, aimed at China's smaller cities with livestreaming and cash rewards. Folded into Douyin in 2020 and renamed Douyin Huoshan Edition.</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">Caicloud</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">Caicloud was a Hangzhou-based Kubernetes/container cloud-native PaaS startup (founded 2015 by ex-Google engineers, CNCF KCSP-certified) whose products included the Caicloud Compass container platform and Caicloud Clever AI middle platform, serving ~100 large enterprises such as China UnionPay…</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Biu Campus</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Shut down</span></span></span><span class="gc-desc">Biu校园 was a China-only campus social networking app (launched 2017) offering anonymous posts, confessions, campus circles, and 1v1 real-time quiz battles among university students.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Xincao</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">Toutiao's Xiaohongshu-style lifestyle app where users found products but left to buy. ByteDance closed it after a year, having never dented Xiaohongshu.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">SBLF</span><span class="gc-meta"><span class="type-tag">HW</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">A techwear fashion brand incubated by Douyin. Launched in summer 2018, it ended soon after for obvious reasons; its Tmall store later switched to selling Douyin merch.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Xintu</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ByteDance's Instagram-style photo community, launched days after Duoshan in 2019. Starved of support, it never caught on; ByteDance pulled it within six months.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Zhidian</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ByteDance's discount shopping app inside Toutiao, built to answer Pinduoduo. Lacking WeChat Pay and group-buying, it flopped; ByteDance pulled it within a year.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Paofu</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">ByteDance's women-focused beauty community, built by its acquired studio Bcy. Its first stab at copying Xiaohongshu, it flopped and was pulled within a year.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Jukedeck</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Shut down</span></span></span><span class="gc-desc">Jukedeck was a London-based AI music startup (founded 2012 by Ed Newton-Rex, with Patrick Stobbs) whose flagship product &quot;Jukedeck Make&quot; let users automatically generate royalty-free background music using neural-network-based composition, with customizable genre, mood, instruments, length and…</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">aiKID</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">aiKID was ByteDance's AI-powered online children's English-learning app launched in late 2018. Rather than live tutoring, it played pre-recorded North-American-teacher lessons paired with AI features (adaptive learning, speech recognition, attention modeling, post-class reports) to create a cheaper…</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">Musical.ly</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">The 15-second lip-sync app that defined teen short video before TikTok. ByteDance bought it in 2017 and merged its ~100M users into TikTok in 2018.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Flipagram</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Rebranded</span></span></span><span class="gc-desc">A US app for making music videos from photos and clips, an early TikTok forerunner. ByteDance's Toutiao bought it in 2017 and folded it into Vigo Video.</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">Live.ly</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">Musical.ly's live-streaming app for broadcasting video and earning gifts. ByteDance closed it in 2018 and folded the streaming into Musical.ly.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Neihan Duanzi</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Banned</span></span></span><span class="gc-desc">ByteDance's very first app (2012, before Toutiao), a hugely popular Chinese joke and meme community. China's regulator shut it for good in 2018 over vulgar content.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Million Hero</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">百万英雄 (Million Hero) was a free, large-scale live-streamed trivia quiz game show launched by ByteDance's Xigua Video in January 2018, riding the early-2018 China live-quiz craze.</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">VSCENE</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">VSCENE (维境视讯) was a Chinese VR-video startup founded in June 2016 that developed end-to-end VR live-streaming and VOD solutions, including VR video capture/stitching, high-efficiency compression and streaming distribution, with products such as the VliveCam panoramic camera, VLiveStudio software…</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Chaoxi Calendar</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Shut down</span></span></span><span class="gc-desc">朝夕日历 (Chaoxi Calendar) was a smart, WeChat-integrated social calendar and time-management app that used voice recognition, NLP and AI to help users quickly schedule events and coordinate group time.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">MyOtee (international name: FaceQ)</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">MyOtee (脸萌) was the viral cartoon-avatar maker by founder Guo Lie's team — users assemble a customized cartoon face from interchangeable parts.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Tuba</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Shut down</span></span></span><span class="gc-desc">图吧 (Tuba) was an early Chinese photo-sharing / image community mobile app founded by Zhang Nan (张楠, later Douyin and ByteDance China CEO) in 2013; it reportedly grew to hundreds of thousands of users within months, catching Zhang Yiming's attention.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Neihan Comics / Gaoxiao Jiongtu (early ByteDance single-purpose content apps)</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">A cluster of roughly a dozen single-theme content apps that ByteDance launched in its founding year (2012) — each pairing one topic with one content format (e.g.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Limao Camera</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Shut down</span></span></span><span class="gc-desc">A Chinese beauty-selfie camera with live smoothing, face-swaps and filters. ByteDance bought it in 2019, then took it offline as one camera too many.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Ripple</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">Ripple was a free AI-powered music-creation, composition and audio-editing iOS app from ByteDance, launched as a US invite-only closed beta on June 30, 2023.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Music Help (Yinyuebang)</span><span class="gc-meta"><span class="type-tag">APP</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">音乐帮 (Music Help) was an early ByteDance domestic music streaming prototype reported by Tech星球 (Tech Planet) in October 2019, ByteDance's first signal of entering China's online music market.</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">Galaxy Ark</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">银河方舟 (Galaxy Ark) was a ByteDance music agent-distribution/aggregation platform that entered closed website-only beta in July 2021, letting record labels and independent musicians upload songs and videos and distribute them across platforms including QQ Music, NetEase Cloud Music, KuGou, KuWo…</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Douyin Monthly Pay</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Rebranded</span></span></span><span class="gc-desc">抖音月付 is ByteDance's &quot;Huabei&quot;-style buy-now-pay-later consumer credit product embedded in the Douyin app, offering an interest-free grace period and 3/6/12-month installments for in-app and Douyin e-commerce purchases.</span></button><button class="grave-card" style="--status:var(--red)"><span class="gc-top"><span class="gc-name">Beiyong Jin (Petty Cash / Backup Fund)</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Dead</span></span></span><span class="gc-desc">备用金 (Beiyong Jin, &quot;petty cash&quot;/&quot;backup fund&quot;) was a small short-term emergency cash-loan product launched by ByteDance on its Toutiao (今日头条) app on 24 July 2020.</span></button><button class="grave-card" style="--status:var(--blue)"><span class="gc-top"><span class="gc-name">ByteAir</span><span class="gc-meta"><span class="type-tag">SVC</span><span class="status-chip"><span class="mark"></span>Merged</span></span></span><span class="gc-desc">灵驹 (English name ByteAir) was ByteDance's first B2B productization of its core recommendation algorithm — the same engine behind Toutiao and Douyin — packaged and opened to external enterprises in September 2019 as a customizable enterprise-grade recommendation-as-a-service.</span></button></div><!--SSR_END--></div>
